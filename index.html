<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test F&B</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #dbe2ea;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: linear-gradient(135deg, #eaf1ff, #ffffff);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .hero p {
      color: var(--muted);
      max-width: 760px;
      margin-bottom: 0;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin: 18px 0 26px;
    }

    .search {
      flex: 1 1 320px;
      min-width: 220px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      background: #fff;
    }

    .button {
      border: none;
      background: var(--accent);
      color: #fff;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    .button:hover {
      background: var(--accent-hover);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      margin-bottom: 16px;
    }

    .badge {
      background: #eff6ff;
      color: var(--accent);
      border: 1px solid #cfe0ff;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    .link-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-item {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fafcff;
    }

    .link-item a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      word-break: break-word;
    }

    .link-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .open-btn {
      display: inline-block;
      background: var(--accent);
      color: #fff !important;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .open-btn:hover {
      background: var(--accent-hover);
      text-decoration: none;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 480px;
      background: #fff;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 12px 14px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f8fbff;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .section-title {
      margin: 8px 0 14px;
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .hidden {
      display: none !important;
    }


    .calc-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .calc-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .calc-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .calc-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      background: #fff;
      color: var(--text);
    }

    .calc-input:focus {
      outline: none;
      border-color: #9bb8ff;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .calc-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .button-secondary {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    .button-secondary:hover {
      background: #f8fbff;
    }

    .calc-result {
      margin-top: 4px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fafcff;
    }

    .calc-result-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--muted);
      margin-bottom: 10px;
      font-weight: 700;
    }

    .calc-result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }

    .calc-result-item {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
    }

    .calc-result-item strong {
      display: block;
      font-size: 20px;
      margin-top: 4px;
    }

    @media (max-width: 640px) {
      .container { padding: 16px; }
      .hero, .card { padding: 18px; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>Шаблон для ссылок и таблиц</h1>
      <p>
        Это простой сайт-шаблон, который можно хранить как один HTML-файл.
        Чтобы обновить ссылки, категории или таблицы, достаточно отредактировать данные в блоке <strong>DATA</strong> внизу файла.
      </p>
    </section>

    <div class="toolbar">
      <input id="searchInput" class="search" type="text" placeholder="Поиск по названиям, описанию, ссылкам и таблицам..." />
      <button class="button" id="expandAllBtn">Показать всё</button>
    </div>

    <div id="content"></div>
  </div>

  <script>
    /*
      =========================
      РЕДАКТИРУЙ ДАННЫЕ ЗДЕСЬ
      =========================

      Как обновлять сайт:
      1. Меняй title и description при необходимости.
      2. В sections добавляй новые блоки.
      3. type может быть:
         - "links"  -> блок со ссылками
         - "table"  -> таблица
      4. Для ссылок используй items.
      5. Для таблиц используй columns и rows.
    */

    const DATA = {
      title: "F&B CC",
      description: "Файли, таблиці та посилання, що використовуються в роботі",
      sections: [
        {
          type: "links",
          title: "Корисні посилання",
          badge: "Посилання",
          description: "Посилання на корисні файли та таблиці, які можуть знадобитися в роботі",
          items: [
            {
              name: "Таблиця з меню ",
              url: "https://drive.google.com/file/d/1G6i7SBMgyEa63Ez-GmIMhKaHuKgFvSjm/view?usp=drive_link",
              note: "Активне посилання на таблицю з меню "
            },
            {
              name: "Інструкція з промивання кавомашини",
              url: "https://docs.google.com/document/d/1poHQB3u6cKMyEZbQSrVXEpbvf7TQjdAc/edit?usp=drive_link&ouid=108602676762976729118&rtpof=true&sd=true",
              note: "Інструкція з промивання кавомашини на 16 поверсі"
            },
            {
              name: "Графік",
              url: "https://accor-my.sharepoint.com/:x:/p/firas_alzoubi/IQAWZ57lQ-_3T7sDT4QGBzxDAQEor7ZIGK18Q8f6GXDxzA4?rtime=-RFyLs593kg",
              note: "Актуальне посилання на графік, дійсне до 2028 року"
            }
          ]
        },
        {
          type: "links",
          title: "Меню ресторану та профіль на Google Maps",
          badge: "Інфо-стенд",
          description: "Інформаційний блок з меню ресторану та сторінка готелю на Google Maps",
          items: [
            {
              name: "Меню ресторану 74 Urbanfood",
              url: "https://ibis.choiceqr.com/",
              note: "Меню ресторану готелю, є QR коди на кожному столику, в пасажирських ліфтах та в номерах."
            },
            {
              name: "Профіль готелю на Google Maps",
              url: "https://maps.app.goo.gl/SKdsJN8Kx4BPqnSq6",
              note: "Тут профіль готелю на Google Maps, заохочуйте гостей залишати позитивні відгуки про готель заради бонусів"
            }
          ]
        },
        {
          type: "calculator",
          title: "Калькулятор завтрака",
          badge: "Расчет",
          description: "Расчет апельсинового сока, яблочного сока и молока по количеству гостей"
        }
      ]
    };

    const content = document.getElementById('content');
    const searchInput = document.getElementById('searchInput');
    const expandAllBtn = document.getElementById('expandAllBtn');

    document.title = DATA.title;
    document.querySelector('.hero h1').textContent = DATA.title;
    document.querySelector('.hero p').textContent = DATA.description;

    function render() {
      content.innerHTML = '';

      const grid = document.createElement('div');
      grid.className = 'grid';

      DATA.sections.forEach((section) => {
        const card = document.createElement('section');
        card.className = 'card searchable';
        card.dataset.search = JSON.stringify(section).toLowerCase();

        const header = document.createElement('div');
        header.className = 'card-header';
        header.innerHTML = `
          <div>
            <h2 class="section-title">${section.title}</h2>
            <div class="muted">${section.description || ''}</div>
          </div>
          <div class="badge">${section.badge || section.type}</div>
        `;
        card.appendChild(header);

        if (section.type === 'links') {
          const list = document.createElement('div');
          list.className = 'link-list';

          section.items.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'link-item';
            div.innerHTML = `
              <div class="link-row">
                <a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.name}</a>
                <a class="open-btn" href="${item.url}" target="_blank" rel="noopener noreferrer">Открыть</a>
              </div>
              <div class="link-note">${item.note || ''}</div>
            `;
            list.appendChild(div);
          });

          card.appendChild(list);
        }


        if (section.type === 'calculator') {
          const calc = document.createElement('div');
          calc.className = 'calc-box';
          calc.innerHTML = `
            <div class="calc-field">
              <label class="calc-label" for="guestsInput">Количество гостей</label>
              <input id="guestsInput" class="calc-input" type="number" min="0" step="1" placeholder="Например, 50" />
            </div>

            <div class="calc-actions">
              <button class="button" type="button" onclick="calculateBreakfast()">Рассчитать</button>
              <button class="button-secondary" type="button" onclick="resetBreakfastCalculator()">Очистить</button>
            </div>

            <div class="calc-result" id="calcResult">
              <div class="calc-result-title">Результат</div>
              <div class="muted">Введите количество гостей и нажмите «Рассчитать».</div>
            </div>
          `;
          card.appendChild(calc);
        }

        if (section.type === 'table') {
          const wrap = document.createElement('div');
          wrap.className = 'table-wrap';

          const table = document.createElement('table');
          const thead = document.createElement('thead');
          const tbody = document.createElement('tbody');

          const headRow = document.createElement('tr');
          section.columns.forEach((col) => {
            const th = document.createElement('th');
            th.textContent = col;
            headRow.appendChild(th);
          });
          thead.appendChild(headRow);

          section.rows.forEach((row) => {
            const tr = document.createElement('tr');
            row.forEach((cell) => {
              const td = document.createElement('td');
              td.textContent = cell;
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });

          table.appendChild(thead);
          table.appendChild(tbody);
          wrap.appendChild(table);
          card.appendChild(wrap);
        }

        const footer = document.createElement('div');
        footer.className = 'footer-note';
        footer.textContent = 'Этот блок можно менять прямо в коде в разделе DATA.';
        card.appendChild(footer);

        grid.appendChild(card);
      });

      content.appendChild(grid);
    }

    function applySearch() {
      const query = searchInput.value.trim().toLowerCase();
      const cards = document.querySelectorAll('.searchable');

      cards.forEach((card) => {
        const haystack = card.dataset.search || '';
        const match = haystack.includes(query);
        card.classList.toggle('hidden', !match);
      });
    }

    searchInput.addEventListener('input', applySearch);
    expandAllBtn.addEventListener('click', () => {
      searchInput.value = '';
      applySearch();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });


    function calculateBreakfast() {
      const guests = parseFloat(document.getElementById('guestsInput')?.value) || 0;
      const orangeJuice = guests * (1.25 / 10);
      const appleJuice = guests * (0.3 / 10);
      const milk = guests * (1 / 10);

      const result = document.getElementById('calcResult');
      if (!result) return;

      result.innerHTML = `
        <div class="calc-result-title">Результат для ${guests.toFixed(0)} гостей</div>
        <div class="calc-result-grid">
          <div class="calc-result-item">
            Апельсиновый сок
            <strong>${orangeJuice.toFixed(2)} л</strong>
          </div>
          <div class="calc-result-item">
            Яблочный сок
            <strong>${appleJuice.toFixed(2)} л</strong>
          </div>
          <div class="calc-result-item">
            Молоко
            <strong>${milk.toFixed(2)} л</strong>
          </div>
        </div>
      `;
    }

    function resetBreakfastCalculator() {
      const input = document.getElementById('guestsInput');
      const result = document.getElementById('calcResult');

      if (input) input.value = '';
      if (result) {
        result.innerHTML = `
          <div class="calc-result-title">Результат</div>
          <div class="muted">Введите количество гостей и нажмите «Рассчитать».</div>
        `;
      }
    }

    render();
  </script>
</body>
</html>
